services:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # NGINX — Single entry point (Port 80 only!)
  # Frontend + Backend dono yahan se accessible
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  nginx:
    image: nginx:1.25-alpine
    container_name: stock-prediction-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - stock-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # BACKEND — Django + ML Model
  # Note: Port 8000 NOT exposed externally — only via nginx!
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend:
    build:
      context: ./backend-drf
      dockerfile: Dockerfile
    container_name: stock-prediction-backend
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-stock-prediction-change-this-secret-key
      - DATABASE_URL=postgresql://postgres:StrongPass123@db:5432/stock_prediction_db
      - REDIS_URL=redis://:redispass123@redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,nginx
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
      - CORS_ALLOW_ALL_ORIGINS=True
    volumes:
      - ./resources:/app/resources:ro
      - media_data:/app/media
    networks:
      - stock-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # FRONTEND — React + Nginx
  # Note: Port 3000 NOT exposed externally — only via main nginx!
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: stock-prediction-frontend
    expose:
      - "80"
    networks:
      - stock-network
    depends_on:
      - backend
    restart: unless-stopped

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # DATABASE — PostgreSQL
  # Note: Port NOT exposed externally — only backend can access!
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  db:
    image: postgres:15-alpine
    container_name: stock-prediction-db
    environment:
      - POSTGRES_DB= ${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # REDIS — Cache + Sessions
  # Note: Port NOT exposed externally!
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  redis:
    image: redis:7-alpine
    container_name: stock-prediction-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    networks:
      - stock-network
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  stock-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_data:

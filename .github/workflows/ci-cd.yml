name: Stock Prediction Portal - CI/CD Pipeline

# Trigger: Run this pipeline on push to main/develop or pull request to main
on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main

jobs:
  
  # ========================================================================
  # JOB 1: BACKEND TESTS
  # ========================================================================
  backend-tests:
    name: Backend Tests (Django + Pytest)
    runs-on: ubuntu-latest
    
    # Services required for backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_stockdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd backend-drf
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov
      
      # Step 4: Wait for database to be ready
      - name: Wait for PostgreSQL
        run: |
          cd backend-drf
          python -c "
          import time
          import psycopg2
          while True:
            try:
              conn = psycopg2.connect(
                host='localhost',
                database='test_stockdb',
                user='testuser',
                password='testpass123'
              )
              conn.close()
              break
            except:
              time.sleep(1)
          print('Database ready!')
          "
      
      # Step 5: Run migrations
      - name: Run Django migrations
        run: |
          cd backend-drf
          python manage.py migrate --noinput
        env:
          DEBUG: 'False'
          DATABASE_URL: postgresql://testuser:testpass123@localhost:5432/test_stockdb
          SECRET_KEY: test-secret-key-for-ci-cd
          ALLOWED_HOSTS: localhost,127.0.0.1
      
      # Step 6: Run tests with coverage
      - name: Run Pytest tests
        run: |
          cd backend-drf
          pytest tests/ \
            --cov=api \
            --cov=accounts \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=45 \
            -v \
            --tb=short
        env:
          DEBUG: 'False'
          DATABASE_URL: postgresql://testuser:testpass123@localhost:5432/test_stockdb
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-cd
          ALLOWED_HOSTS: localhost,127.0.0.1
      
      # Step 7: Upload coverage results to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend-drf/coverage.xml
          flags: backend
          fail_ci_if_error: false
      
      # Step 8: Run code quality check (non-blocking)
      - name: Run Flake8 linting
        run: |
          cd backend-drf
          pip install flake8
          flake8 api accounts stock_prediction_main --max-line-length=100 --ignore=E203,W503 || true
  
  
  # ========================================================================
  # JOB 2: FRONTEND BUILD & TESTS
  # ========================================================================
  frontend-build:
    name: Frontend Build (React + Vite)
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: Setup Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: 'frontend-react/package.json'
      
      # Step 3: Install npm dependencies
      - name: Install npm dependencies
        run: |
          cd frontend-react
          npm ci
      
      # Step 4: Check code format (non-blocking)
      - name: Check code format
        run: |
          cd frontend-react
          npm run format:check || true
      
      # Step 5: Run ESLint (non-blocking)
      - name: Run ESLint
        run: |
          cd frontend-react
          npm run lint || true
      
      # Step 6: Build production bundle
      - name: Build production bundle
        run: |
          cd frontend-react
          npm run build
        env:
          VITE_BACKEND_BASE_API: http://localhost:8000/api/v1/
          VITE_BACKEND_ROOT: http://localhost:8000
      
      # Step 7: Verify that build output exists
      - name: Verify build output
        run: |
          cd frontend-react
          test -d dist || exit 1
          test -f dist/index.html || exit 1
          echo "Build successful!"
  
  
  # ========================================================================
  # JOB 3: DOCKER BUILD
  # Runs only after both Jobs 1 & 2 pass, and only on push to main
  # ========================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Step 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Build and Push Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-drf
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/stock-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/stock-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 6: Build and Push Frontend Image
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/stock-frontend:latest
            ${{ steps.login-ecr.outputs.registry }}/stock-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  
  # ========================================================================
  # JOB 4: SECURITY SCANNING
  # Scans for vulnerabilities on main branch
  # ========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Trivy scans filesystem for known CVEs
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL'
      
      # Step 3: Bandit checks Python code for security issues
      - name: Check Python dependencies (bandit)
        run: |
          pip install bandit
          cd backend-drf
          bandit -r . --skip B101,B601 || true
  
  
  # ========================================================================
  # JOB 5: NOTIFICATIONS
  # Always runs — reports final pipeline status
  # ========================================================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, docker-build]
    if: always()
    
    steps:
      - name: Check CI/CD Status
        run: |
          if [ "${{ needs.backend-tests.result }}" = "success" ] && \
             [ "${{ needs.frontend-build.result }}" = "success" ]; then
            echo "All checks passed!"
            echo "Ready to push to ECR"
          else
            echo "Some checks failed!"
            exit 1
          fi


# ========================================================================
# PIPELINE OVERVIEW
# ========================================================================
#
# WHAT THIS FILE DOES:
# GitHub Actions automatically runs this workflow on every push or PR.
# It tests, builds, and validates the full application before deployment.
#
# PIPELINE FLOW:
# 1. Push code to GitHub
# 2. Backend tests run (Django + Pytest + PostgreSQL + Redis)
# 3. Frontend build runs (React + Vite)
# 4. Docker images are built (only on main branch push)
# 5. Security scan runs (Trivy + Bandit)
# 6. Notification job reports final status
#
# JOBS SEQUENCE:
# [backend-tests] ──┐
#                   ├──> [docker-build] ──> [notify]
# [frontend-build]──┘
# [security-scan] (independent, only on main)
#
# Expected runtime: 5-10 minutes total
#
# View results:
# GitHub > Actions tab > Latest workflow run

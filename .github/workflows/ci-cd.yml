name: Stock Prediction Portal — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_BACKEND_REPO: stock-prediction-backend
  ECR_FRONTEND_REPO: stock-prediction-frontend
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

jobs:

  # ============================================================
  # JOB 1: Backend Tests
  # ============================================================
  backend-tests:
    name: Backend Tests (Django + Pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_stockdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        working-directory: backend-drf
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov factory-boy

      - name: Run Tests with Coverage
        working-directory: backend-drf
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DATABASE_URL: postgresql://testuser:testpass123@localhost:5432/test_stockdb
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-for-production
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          file: backend-drf/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ============================================================
  # JOB 2: Code Quality Check
  # ============================================================
  code-quality:
    name: Code Quality (Flake8 + Black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Linters
        run: |
          pip install flake8 black isort bandit

      - name: Flake8 — Python Syntax Check
        working-directory: backend-drf
        run: |
          flake8 api/ \
            --max-line-length=120 \
            --exclude=migrations,__pycache__ \
            --statistics

      - name: Black — Code Format Check
        working-directory: backend-drf
        run: |
          black --check api/ --line-length=120

      - name: Bandit — Security Linting
        working-directory: backend-drf
        run: |
          bandit -r api/ \
            -x api/tests \
            --severity-level medium \
            -f json \
            -o bandit-report.json || true
          cat bandit-report.json

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: backend-drf/bandit-report.json

  # ============================================================
  # JOB 3: Frontend Tests + Build
  # ============================================================
  frontend-build:
    name: Frontend Build (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          

      - name: Install Dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build Frontend
        working-directory: frontend-react
        env:
          VITE_BACKEND_BASE_API: /api/v1/
          VITE_BACKEND_ROOT: http://localhost
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-react/dist/
          retention-days: 1

  # ============================================================
  # JOB 4: Docker Build + Push to AWS ECR
  # ============================================================
  docker-build-push:
    name: Docker Build + Push to ECR
    runs-on: ubuntu-latest
    needs: [ backend-tests, code-quality, frontend-build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Tags
        id: tags
        run: |
          echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build + Push Backend Image
        env:
          REGISTRY: ${{ steps.tags.outputs.REGISTRY }}
          SHA: ${{ steps.tags.outputs.SHA }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_BACKEND_REPO:$SHA \
            -t $REGISTRY/$ECR_BACKEND_REPO:latest \
            ./backend-drf

          docker push $REGISTRY/$ECR_BACKEND_REPO:$SHA
          docker push $REGISTRY/$ECR_BACKEND_REPO:latest

          echo "Backend image: $REGISTRY/$ECR_BACKEND_REPO:$SHA"

      - name: Build + Push Frontend Image
        env:
          REGISTRY: ${{ steps.tags.outputs.REGISTRY }}
          SHA: ${{ steps.tags.outputs.SHA }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_FRONTEND_REPO:$SHA \
            -t $REGISTRY/$ECR_FRONTEND_REPO:latest \
            ./frontend-react

          docker push $REGISTRY/$ECR_FRONTEND_REPO:$SHA
          docker push $REGISTRY/$ECR_FRONTEND_REPO:latest

          echo "Frontend image: $REGISTRY/$ECR_FRONTEND_REPO:$SHA"

      - name: Save Image Tags to Summary
        env:
          REGISTRY: ${{ steps.tags.outputs.REGISTRY }}
          SHA: ${{ steps.tags.outputs.SHA }}
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`$REGISTRY/$ECR_BACKEND_REPO:$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`$REGISTRY/$ECR_FRONTEND_REPO:$SHA\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 5: Notify on Success/Failure
  # ============================================================
  notify:
    name: Pipeline Notification
    runs-on: ubuntu-latest
    needs: [ docker-build-push ]
    if: always()

    steps:
      - name: Success Notification
        if: needs.docker-build-push.result == 'success'
        run: |
          echo "✅ Pipeline SUCCESS!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      - name: Failure Notification
        if: needs.docker-build-push.result == 'failure'
        run: |
          echo "❌ Pipeline FAILED!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Check logs above for details"

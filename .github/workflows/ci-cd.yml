name: Stock Prediction Portal - CI/CD Pipeline

# 🚀 WHEN TO RUN THIS PIPELINE
on:
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main

# JOBS - KYA CHALNA CHAHIYE
jobs:
  
  # ========================================================================
  # JOB 1: BACKEND TESTS
  # ========================================================================
  backend-tests:
    name: Backend Tests (Django + Pytest)
    runs-on: ubuntu-latest
    
    # Services required for backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_stockdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Python
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      
      # Step 3: Install dependencies
      - name: 📦 Install dependencies
        run: |
          cd backend-drf
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov
      
      # Step 4: Wait for DB
      - name: ⏳ Wait for PostgreSQL
        run: |
          cd backend-drf
          python -c "
          import time
          import psycopg2
          while True:
            try:
              conn = psycopg2.connect(
                host='localhost',
                database='test_stockdb',
                user='testuser',
                password='testpass123'
              )
              conn.close()
              break
            except:
              time.sleep(1)
          print('Database ready!')
          "
      
      # Step 5: Run migrations
      - name: 🗄️ Run Django migrations
        run: |
          cd backend-drf
          python manage.py migrate --noinput
        env:
          DEBUG: 'False'
          DATABASE_URL: postgresql://testuser:testpass123@localhost:5432/test_stockdb
          SECRET_KEY: test-secret-key-for-ci-cd
          ALLOWED_HOSTS: localhost,127.0.0.1
      
      # Step 6: Run tests
      - name: ✅ Run Pytest tests
        run: |
          cd backend-drf
          pytest tests/ \
            --cov=api \
            --cov=accounts \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=45 \
            -v \
            --tb=short
        env:
          DEBUG: 'False'
          DATABASE_URL: postgresql://testuser:testpass123@localhost:5432/test_stockdb
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-cd
          ALLOWED_HOSTS: localhost,127.0.0.1
      
      # Step 7: Upload coverage to Codecov
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend-drf/coverage.xml
          flags: backend
          fail_ci_if_error: false
      
      # Step 8: Check code quality (optional)
      - name: 🔍 Run Flake8 linting
        run: |
          cd backend-drf
          pip install flake8
          flake8 api accounts stock_prediction_main --max-line-length=100 --ignore=E203,W503 || true
  
  
  # ========================================================================
  # JOB 2: FRONTEND BUILD & TESTS
  # ========================================================================
  frontend-build:
    name: Frontend Build (React + Vite)
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: 🔧 Setup Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: 'frontend-react/package.json'
      
      # Step 3: Install dependencies
      - name: 📦 Install npm dependencies
        run: |
          cd frontend-react
          npm ci  # Clean install
      
      # Step 4: Check code format (optional)
      - name: 🎨 Check code format
        run: |
          cd frontend-react
          npm run format:check || true
      
      # Step 5: Run linter
      - name: 🔍 Run ESLint
        run: |
          cd frontend-react
          npm run lint || true  # Don't fail on lint errors
      
      # Step 6: Build for production
      - name: 🏗️ Build production bundle
        run: |
          cd frontend-react
          npm run build
        env:
          VITE_BACKEND_BASE_API: http://localhost:8000/api/v1/
          VITE_BACKEND_ROOT: http://localhost:8000
      
      # Step 7: Check build output
      - name: ✅ Verify build output
        run: |
          cd frontend-react
          test -d dist || exit 1
          test -f dist/index.html || exit 1
          echo "✅ Build successful!"
  
  
  # ========================================================================
  # JOB 3: DOCKER BUILD
  # ========================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]  # Only run after tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Docker Buildx
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Step 3: Build backend image
      - name: 🏗️ Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-drf
          push: false
          tags: shikeb1/stock-prediction-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Step 4: Build frontend image
      - name: 🏗️ Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: false
          tags: shikeb1/stock-prediction-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Step 5: Verify images build successfully
      - name: ✅ Verify Docker builds
        run: |
          echo "✅ Docker images ready to push to ECR"
          echo "Backend: shikeb1/stock-prediction-backend:${{ github.sha }}"
          echo "Frontend: shikeb1/stock-prediction-frontend:${{ github.sha }}"
  
  
  # ========================================================================
  # JOB 4: SECURITY SCANNING (Optional)
  # ========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      # Step 1: Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Run Trivy vulnerability scan
      - name: 🔒 Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'  # Fail on vulnerabilities
          severity: 'CRITICAL'
      
      # Step 3: Check dependencies
      - name: 📦 Check Python dependencies (bandit)
        run: |
          pip install bandit
          cd backend-drf
          bandit -r . --skip B101,B601 || true
  
  
  # ========================================================================
  # JOB 5: NOTIFICATIONS
  # ========================================================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, docker-build]
    if: always()  # Run even if others fail
    
    steps:
      - name: 📢 Check CI/CD Status
        run: |
          if [ "${{ needs.backend-tests.result }}" = "success" ] && \
             [ "${{ needs.frontend-build.result }}" = "success" ]; then
            echo "✅ All checks passed!"
            echo "Ready to push to ECR"
          else
            echo "❌ Some checks failed!"
            exit 1
          fi


# ========================================================================
# EXPLANATION
# ========================================================================

# KYA HAI YEH FILE:
# GitHub Actions automatic workflow - GitHub server pe code test hota hai
#
# KYA HOTA HAI:
# 1. Push करो github pe → automatically tests chalti hain
# 2. Tests pass → docker images ready
# 3. Tests fail → notification milti hai
#
# JOBS SEQUENCE:
# ✅ Backend tests
# ✅ Frontend build
# ✅ Docker build (sirf agar tests pass)
# ✅ Security scan
# ✅ Notify
#
# Expected time: 5-10 minutes total
#
# View results:
# GitHub > Actions tab > Last workflow run

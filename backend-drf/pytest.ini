[pytest]
# ========================================================================
# PYTEST CONFIGURATION FOR STOCK PREDICTION PORTAL
# ========================================================================

# Django settings module
DJANGO_SETTINGS_MODULE = stock_prediction_main.settings

# Python files to collect as tests
python_files = test_*.py *_test.py

# Test classes pattern
python_classes = Test*

# Test functions pattern
python_functions = test_*

# Command line options
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -q
    --maxfail=3
    --cov=api
    --cov=accounts
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=45

# Markers for organizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security tests
    ml: marks tests as ML model tests

# Timeout for tests (30 seconds)
timeout = 30

# Django database
django_db_modify_db_defaults = True

# Ignore these files
norecursedirs = .git .tox build dist *.egg venv

# Minimum Python version
minversion = 7.0

# Test discovery
testpaths = tests

# ========================================================================
# COVERAGE SETTINGS
# ========================================================================
[coverage:run]
branch = True
omit =
    */migrations/*
    */tests/*
    */venv/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
